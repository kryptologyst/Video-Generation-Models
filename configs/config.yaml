# Configuration file for video generation models
defaults:
  - _self_

# Model configuration
model:
  generator:
    z_dim: 100
    num_frames: 16
    img_channels: 3
    img_size: 64
    hidden_dim: 512
    
  discriminator:
    img_channels: 3
    img_size: 64
    num_frames: 16
    hidden_dim: 512

# Training configuration
training:
  batch_size: 32
  num_epochs: 200
  learning_rate: 0.0002
  beta1: 0.5
  beta2: 0.999
  weight_decay: 0.0
  
  # GAN specific
  d_steps_per_g_step: 1
  gradient_penalty_weight: 10.0
  use_spectral_norm: true
  use_ema: true
  ema_decay: 0.999

# Data configuration
data:
  dataset_name: "moving_mnist"
  data_dir: "./data"
  num_workers: 4
  pin_memory: true
  
  # Video specific
  fps: 10
  max_frames: 16
  resize_size: 64

# Evaluation configuration
evaluation:
  metrics:
    - "fvd"
    - "clip_score"
    - "lpips"
  num_samples: 1000
  save_samples: true

# Logging configuration
logging:
  log_dir: "./logs"
  log_every_n_steps: 100
  save_every_n_epochs: 10
  use_wandb: false
  wandb_project: "video_generation"

# Device configuration
device: "auto"  # auto, cuda, mps, cpu
mixed_precision: true
compile_model: false

# Reproducibility
seed: 42
deterministic: true
